          - Worked with Design team to refine gameplay mechanics and feedback loops to ensure a high-quality gameplay experience
          - Involved in level balancing process, developed custom Unity Editor Window tools to enable game designers to easily create and configure game levels
          - Involved in post-launch process to develop engaging mini-games and reward systems to drive player retention
      - company: VNG
